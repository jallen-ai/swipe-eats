    html, body {
      height: 100%;

    body {
      display: flex;
      justify-content: center;
      align-items: center;
    }

    #root {
      width: 100%;
      max-width: 430px;
      height: 100%;
      position: relative;
      overflow: hidden;
    }
  </style>

      { id: 13, name: "Ramen House", cuisine: "Japanese", price: "$$", distance: "1.6 mi", rating: 4.8, photo: "https://images.unsplash.com/photo-1569718212165-3a8278d5f624?w=600&h=800&fit=crop", color: "#E64980" },
      { id: 14, name: "El Fuego", cuisine: "Mexican", price: "$$", distance: "2.0 mi", rating: 4.3, photo: "https://images.unsplash.com/photo-1551504734-5ee1c4a1479b?w=600&h=800&fit=crop", color: "#FF6348" },
      { id: 15, name: "The Poke Bowl", cuisine: "Hawaiian", price: "$$", distance: "1.3 mi", rating: 4.5, photo: "https://images.unsplash.com/photo-1546069901-ba9599a7e63c?w=600&h=800&fit=crop", color: "#20C997" },
    ];

    const CUISINE_GROUPS = {
      "Asian": ["Japanese", "Thai", "Vietnamese", "Korean", "Chinese"],
      "Latin": ["Mexican"],
      "European": ["Italian", "Greek", "Mediterranean"],
      "American": ["American"],
      "Island": ["Hawaiian"],
      "South Asian": ["Indian"],
    };

    function getCuisineGroup(cuisine) {
      for (const [group, cuisines] of Object.entries(CUISINE_GROUPS)) {
        if (cuisines.includes(cuisine)) return group;
      }
      return "Other";
    }

    /* ============================================================
       PREFERENCE ENGINE
       ============================================================ */
    class PreferenceEngine {
      constructor() {
        this.swipeHistory = []; // { restaurantId, direction, cuisine, timestamp }
        this.orderHistory = []; // { restaurantId, cuisine, timestamp }
        this.shakeUpActive = false;
      }

      recordSwipe(restaurant, direction) {
        this.swipeHistory.push({
          restaurantId: restaurant.id,
          direction,
          cuisine: restaurant.cuisine,
          cuisineGroup: getCuisineGroup(restaurant.cuisine),
          timestamp: Date.now(),
        });
      }

      recordOrder(restaurant) {
        this.orderHistory.push({
          restaurantId: restaurant.id,
          cuisine: restaurant.cuisine,
          cuisineGroup: getCuisineGroup(restaurant.cuisine),
          timestamp: Date.now(),
        });
      }

      getScore(restaurant) {
        let score = 50; // base score

        // Recency penalty: if ordered from this exact place recently, deprioritize
        const recentOrder = this.orderHistory.find(o => o.restaurantId === restaurant.id);
        if (recentOrder) {
          const daysSince = (Date.now() - recentOrder.timestamp) / (1000 * 60 * 60 * 24);
          if (daysSince < 3) score -= 40;
          else if (daysSince < 7) score -= 20;
        }

        // Cuisine preference: boost cuisines the user tends to swipe right on
        const cuisineSwipes = this.swipeHistory.filter(s => s.cuisine === restaurant.cuisine);
        const rightSwipes = cuisineSwipes.filter(s => s.direction === 'right').length;
        const leftSwipes = cuisineSwipes.filter(s => s.direction === 'left').length;
        if (cuisineSwipes.length > 0) {
          const preference = (rightSwipes - leftSwipes) / cuisineSwipes.length;
          score += preference * 20;
        }

        // Cuisine group fatigue: if we've been showing a lot of one group, deprioritize
        const recentGroupSwipes = this.swipeHistory.slice(-5).filter(
          s => s.cuisineGroup === getCuisineGroup(restaurant.cuisine)
        ).length;
        score -= recentGroupSwipes * 5;

        // Shake Up: invert preferences
        if (this.shakeUpActive) {
          score = 100 - score;
          this.shakeUpActive = false; // one-shot
        }

        // Add some randomness
        score += (Math.random() - 0.5) * 15;

        return Math.max(0, Math.min(100, score));
      }

      sortRestaurants(restaurants) {
        return [...restaurants]
          .map(r => ({ ...r, _score: this.getScore(r) }))
          .sort((a, b) => b._score - a._score);
      }

      shakeUp() {
        this.shakeUpActive = true;
      }
    }

    /* ============================================================
       CONFETTI / PARTICLES
       ============================================================ */
    function ConfettiCanvas({ active }) {
      const canvasRef = useRef(null);
      const particlesRef = useRef([]);
      const animRef = useRef(null);

      useEffect(() => {
        if (!active) return;
        const canvas = canvasRef.current;
        if (!canvas) return;
        const ctx = canvas.getContext('2d');
        canvas.width = canvas.offsetWidth * 2;
        canvas.height = canvas.offsetHeight * 2;
        ctx.scale(2, 2);

        const colors = ['#E85D3A', '#2DD4A8', '#FFA94D', '#FF6B6B', '#339AF0', '#FCC419'];
        const particles = [];
        for (let i = 0; i < 60; i++) {
          particles.push({
            x: canvas.offsetWidth / 2,
            y: canvas.offsetHeight / 2,
            vx: (Math.random() - 0.5) * 16,
            vy: (Math.random() - 0.5) * 16 - 4,
            size: Math.random() * 8 + 3,
            color: colors[Math.floor(Math.random() * colors.length)],
            rotation: Math.random() * 360,
            rotSpeed: (Math.random() - 0.5) * 12,
            opacity: 1,
            shape: Math.random() > 0.5 ? 'rect' : 'circle',
          });
        }
        particlesRef.current = particles;

        function animate() {
          ctx.clearRect(0, 0, canvas.offsetWidth, canvas.offsetHeight);
          let alive = false;
          for (const p of particles) {
            p.x += p.vx;
            p.y += p.vy;
            p.vy += 0.3;
            p.vx *= 0.99;
            p.rotation += p.rotSpeed;
            p.opacity -= 0.012;
            if (p.opacity <= 0) continue;
            alive = true;
            ctx.save();
            ctx.translate(p.x, p.y);
            ctx.rotate((p.rotation * Math.PI) / 180);
            ctx.globalAlpha = p.opacity;
            ctx.fillStyle = p.color;
            if (p.shape === 'rect') {
              ctx.fillRect(-p.size / 2, -p.size / 2, p.size, p.size * 0.6);
            } else {
              ctx.beginPath();
              ctx.arc(0, 0, p.size / 2, 0, Math.PI * 2);
              ctx.fill();
            }
            ctx.restore();
          }
          if (alive) animRef.current = requestAnimationFrame(animate);
        }
        animate();
        return () => cancelAnimationFrame(animRef.current);
      }, [active]);

      return (
        <canvas
          ref={canvasRef}
          style={{
            position: 'absolute', inset: 0,
            width: '100%', height: '100%',
            pointerEvents: 'none', zIndex: 100,
          }}
        />
      );
    }

    /* ============================================================
       SWIPE CARD COMPONENT
       ============================================================ */
    function SwipeCard({ restaurant, onSwipe, isTop, style }) {
      const cardRef = useRef(null);
      const startX = useRef(0);
      const startY = useRef(0);
      const currentX = useRef(0);
      const isDragging = useRef(false);
      const [dragState, setDragState] = useState({ x: 0, rotate: 0, opacity: 1 });
      const [exitAnim, setExitAnim] = useState(null);

      const handleStart = useCallback((clientX, clientY) => {
        if (!isTop) return;
        isDragging.current = true;
        startX.current = clientX;
        startY.current = clientY;
        currentX.current = 0;
      }, [isTop]);

      const handleMove = useCallback((clientX) => {
        if (!isDragging.current) return;
        const dx = clientX - startX.current;
        currentX.current = dx;
        const rotate = dx * 0.08;
        const opacity = 1 - Math.abs(dx) / 600;
        setDragState({ x: dx, rotate, opacity: Math.max(0.6, opacity) });
      }, []);

      const handleEnd = useCallback(() => {
        if (!isDragging.current) return;
        isDragging.current = false;
        const dx = currentX.current;
        const threshold = 80;

        if (Math.abs(dx) > threshold) {
          const direction = dx > 0 ? 'right' : 'left';
          setExitAnim(direction);
          setTimeout(() => onSwipe(direction), 350);
        } else {
          // Snap back with spring
          setDragState({ x: 0, rotate: 0, opacity: 1 });
        }
      }, [onSwipe]);

      useEffect(() => {
        if (!isTop) return;
        const el = cardRef.current;
        if (!el) return;

        const onTouchStart = (e) => handleStart(e.touches[0].clientX, e.touches[0].clientY);
        const onTouchMove = (e) => { e.preventDefault(); handleMove(e.touches[0].clientX); };
        const onTouchEnd = () => handleEnd();
        const onMouseDown = (e) => handleStart(e.clientX, e.clientY);
        const onMouseMove = (e) => handleMove(e.clientX);
        const onMouseUp = () => handleEnd();

        el.addEventListener('touchstart', onTouchStart, { passive: true });
        el.addEventListener('touchmove', onTouchMove, { passive: false });
        el.addEventListener('touchend', onTouchEnd);
        el.addEventListener('mousedown', onMouseDown);
        window.addEventListener('mousemove', onMouseMove);
        window.addEventListener('mouseup', onMouseUp);

        return () => {
          el.removeEventListener('touchstart', onTouchStart);
          el.removeEventListener('touchmove', onTouchMove);
          el.removeEventListener('touchend', onTouchEnd);
          el.removeEventListener('mousedown', onMouseDown);
          window.removeEventListener('mousemove', onMouseMove);
          window.removeEventListener('mouseup', onMouseUp);
        };
      }, [isTop, handleStart, handleMove, handleEnd]);

      let transform, opacity, transition;
      if (exitAnim) {
        const exitX = exitAnim === 'right' ? 500 : -500;
        const exitRotate = exitAnim === 'right' ? 20 : -20;
        const exitY = exitAnim === 'left' ? 30 : -10;
        transform = `translate(${exitX}px, ${exitY}px) rotate(${exitRotate}deg) scale(${exitAnim === 'right' ? 0.95 : 0.92})`;
        opacity = exitAnim === 'right' ? 0.9 : 0.4;
        transition = 'transform 0.35s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.35s ease';
      } else if (isDragging.current || dragState.x !== 0) {
        transform = `translate(${dragState.x}px, 0) rotate(${dragState.rotate}deg)`;
        opacity = dragState.opacity;
        transition = isDragging.current ? 'none' : 'transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275), opacity 0.3s ease';
      } else {
        transform = 'translate(0, 0) rotate(0deg)';
        opacity = 1;
        transition = 'transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275), opacity 0.3s ease';
      }

      // Swipe indicators
      const swipeProgress = Math.min(Math.abs(dragState.x) / 80, 1);
      const showRight = dragState.x > 20;
      const showLeft = dragState.x < -20;

      return (
        <div
          ref={cardRef}
          style={{
            position: 'absolute',
            width: 'calc(100% - 32px)',
            left: '16px',
            height: '75vh',
            maxHeight: '580px',
            borderRadius: 'var(--radius-card)',
            overflow: 'hidden',
            transform,
            opacity,
            transition,
            cursor: isTop ? 'grab' : 'default',
            userSelect: 'none',
            boxShadow: isTop ? 'var(--shadow-card)' : '0 4px 16px rgba(0,0,0,0.2)',
            zIndex: isTop ? 10 : 5,
            ...style,
          }}
        >
          {/* Photo section - 60% */}
          <div style={{
            position: 'relative',
            height: '60%',
            overflow: 'hidden',
            background: restaurant.color || '#333',
          }}>
            <img
              src={restaurant.photo}
              alt={restaurant.name}
              style={{
                width: '100%',
                height: '100%',
                objectFit: 'cover',
                display: 'block',
              }}
              draggable={false}
            />
            {/* Gradient overlay */}
            <div style={{
              position: 'absolute',
              bottom: 0,
              left: 0,
              right: 0,
              height: '50%',
              background: 'linear-gradient(transparent, var(--bg-card))',
            }} />

            {/* Swipe indicator overlays */}
            {showRight && (
              <div style={{
                position: 'absolute', inset: 0,
                background: `rgba(232, 93, 58, ${swipeProgress * 0.25})`,
                display: 'flex', alignItems: 'center', justifyContent: 'center',
                transition: 'background 0.1s',
              }}>
                <div style={{
                  border: '4px solid var(--accent-primary)',
                  borderRadius: '12px',
                  padding: '8px 24px',
                  transform: `rotate(-20deg) scale(${0.8 + swipeProgress * 0.4})`,
                  opacity: swipeProgress,
                }}>
                  <span style={{ fontSize: '28px', fontWeight: 900, color: 'var(--accent-primary)', letterSpacing: '2px' }}>YUM</span>
                </div>
              </div>
            )}
            {showLeft && (
              <div style={{
                position: 'absolute', inset: 0,
                background: `rgba(150, 150, 168, ${swipeProgress * 0.2})`,
                display: 'flex', alignItems: 'center', justifyContent: 'center',
                transition: 'background 0.1s',
              }}>
                <div style={{
                  border: '4px solid var(--text-secondary)',
                  borderRadius: '12px',
                  padding: '8px 24px',
                  transform: `rotate(20deg) scale(${0.8 + swipeProgress * 0.4})`,
                  opacity: swipeProgress,
                }}>
                  <span style={{ fontSize: '28px', fontWeight: 900, color: 'var(--text-secondary)', letterSpacing: '2px' }}>NAH</span>
                </div>
              </div>
            )}
          </div>

          {/* Info section - 40% */}
          <div style={{
            height: '40%',
            background: 'var(--bg-card)',
            padding: '20px 24px',
            display: 'flex',
            flexDirection: 'column',
            justifyContent: 'space-between',
          }}>
            <div>
              <h2 style={{
                fontSize: '26px',
                fontWeight: 800,
                lineHeight: 1.2,
                marginBottom: '6px',
              }}>{restaurant.name}</h2>
              <div style={{
                display: 'flex',
                alignItems: 'center',
                gap: '12px',
                marginBottom: '12px',
              }}>
                <span style={{
                  background: 'var(--bg-surface)',
                  padding: '4px 12px',
                  borderRadius: '20px',
                  fontSize: '14px',
                  fontWeight: 600,
                  color: 'var(--accent-secondary)',
                }}>{restaurant.cuisine}</span>
                <span style={{ fontSize: '14px', color: 'var(--text-secondary)', fontWeight: 600 }}>{restaurant.price}</span>
              </div>
            </div>
            <div style={{
              display: 'flex',
              justifyContent: 'space-between',
              alignItems: 'center',
            }}>
              <div style={{ display: 'flex', alignItems: 'center', gap: '6px' }}>
                <svg width="16" height="16" viewBox="0 0 24 24" fill="var(--accent-primary)" stroke="none">
                  <path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/>
                </svg>
                <span style={{ fontSize: '15px', fontWeight: 700 }}>{restaurant.rating}</span>
              </div>
              <div style={{ display: 'flex', alignItems: 'center', gap: '6px' }}>
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="var(--text-secondary)" strokeWidth="2">
                  <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0118 0z"/>
                  <circle cx="12" cy="10" r="3"/>
                </svg>
                <span style={{ fontSize: '14px', color: 'var(--text-secondary)', fontWeight: 600 }}>{restaurant.distance}</span>
              </div>
            </div>
          </div>
        </div>
      );
    }

    /* ============================================================
       SHAKE UP BUTTON
       ============================================================ */
    function ShakeUpButton({ onShakeUp, disabled }) {
      const [animating, setAnimating] = useState(false);

      const handleClick = () => {
        if (disabled || animating) return;
        setAnimating(true);
        onShakeUp();
        setTimeout(() => setAnimating(false), 800);
      };

      return (
        <button
          onClick={handleClick}
          disabled={disabled}
          style={{
            width: '56px',
            height: '56px',
            borderRadius: '50%',
            border: 'none',
            background: animating
              ? 'linear-gradient(135deg, var(--accent-secondary), #1AAF8B)'
              : 'var(--bg-surface)',
            color: 'var(--accent-secondary)',
            cursor: disabled ? 'default' : 'pointer',
            display: 'flex',
            alignItems: 'center',
            justifyContent: 'center',
            transition: 'all 0.3s ease',
            transform: animating ? 'rotate(180deg) scale(1.15)' : 'scale(1)',
            boxShadow: animating ? `0 0 24px ${`var(--accent-secondary-glow)`}` : '0 4px 12px rgba(0,0,0,0.3)',
            opacity: disabled ? 0.4 : 1,
          }}
        >
          <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round">
            <path d="M2 18h1.4c1.3 0 2.5-.6 3.3-1.7l6.6-8.6c.8-1.1 2-1.7 3.3-1.7H22"/>
            <path d="M18 2l4 4-4 4"/>
            <path d="M2 6h1.4c1.3 0 2.5.6 3.3 1.7l6.6 8.6c.8 1.1 2 1.7 3.3 1.7H22"/>
            <path d="M18 14l4 4-4 4"/>
          </svg>
        </button>
      );
    }

    /* ============================================================
       MATCH TRAY
       ============================================================ */
    function MatchTray({ matches, onSelect }) {
      if (matches.length === 0) return null;

      return (
        <div style={{
          position: 'absolute',
          bottom: '100px',
          left: '16px',
          right: '16px',
          display: 'flex',
          gap: '10px',
          overflowX: 'auto',
          padding: '8px 0',
          zIndex: 50,
        }}>
          {matches.map((m, i) => (
            <button
              key={m.id}
              onClick={() => onSelect(m)}
              style={{
                flexShrink: 0,
                width: '64px',
                height: '64px',
                borderRadius: '16px',
                border: '2px solid var(--accent-primary)',
                overflow: 'hidden',
                cursor: 'pointer',
                padding: 0,
                background: 'var(--bg-card)',
                boxShadow: `0 0 12px ${`var(--accent-primary-glow)`}`,
                animation: `matchPop 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) ${i * 0.05}s both`,
              }}
            >
              <img src={m.photo} alt={m.name} style={{ width: '100%', height: '100%', objectFit: 'cover' }} />
            </button>
          ))}
          <style>{`
            @keyframes matchPop {
              from { transform: scale(0); opacity: 0; }
              to { transform: scale(1); opacity: 1; }
            }
          `}</style>
        </div>
      );
    }

    /* ============================================================
       SESSION SETUP SCREEN
       ============================================================ */
    function SessionScreen({ onStart }) {
      const [mode, setMode] = useState(null);

      return (
        <div style={{
          height: '100%',
          display: 'flex',
          flexDirection: 'column',
          justifyContent: 'center',
          alignItems: 'center',
          padding: '32px',
          gap: '24px',
        }}>
          {/* Logo */}
          <div style={{ textAlign: 'center', marginBottom: '20px' }}>
            <div style={{
              fontSize: '48px',
              marginBottom: '8px',
              filter: 'drop-shadow(0 0 12px rgba(232, 93, 58, 0.5))',
            }}>🍽️</div>
            <h1 style={{
              fontSize: '36px',
              fontWeight: 900,
              background: 'linear-gradient(135deg, var(--accent-primary), #FF8A65)',
              WebkitBackgroundClip: 'text',
              WebkitTextFillColor: 'transparent',
              marginBottom: '8px',
            }}>SwipeEats</h1>
            <p style={{
              color: 'var(--text-secondary)',
              fontSize: '16px',
              fontWeight: 600,
            }}>Swipe your way to dinner</p>
          </div>

          {/* Mode selection */}
          <button
            onClick={() => onStart('solo')}
            style={{
              width: '100%',
              padding: '20px',
              borderRadius: 'var(--radius-btn)',
              border: 'none',
              background: 'var(--bg-card)',
              color: 'var(--text-primary)',
              cursor: 'pointer',
              textAlign: 'left',
              transition: 'transform 0.2s, box-shadow 0.2s',
            }}
            onPointerDown={e => e.currentTarget.style.transform = 'scale(0.97)'}
            onPointerUp={e => e.currentTarget.style.transform = 'scale(1)'}
          >
            <div style={{ fontSize: '22px', fontWeight: 800, marginBottom: '4px' }}>Solo Mode</div>
            <div style={{ fontSize: '14px', color: 'var(--text-secondary)', fontWeight: 600 }}>Just you deciding tonight's dinner</div>
          </button>

          <button
            onClick={() => onStart('duo')}
            style={{
              width: '100%',
              padding: '20px',
              borderRadius: 'var(--radius-btn)',
              border: '2px solid var(--accent-primary)',
              background: 'transparent',
              color: 'var(--text-primary)',
              cursor: 'pointer',
              textAlign: 'left',
              transition: 'transform 0.2s, box-shadow 0.2s',
            }}
            onPointerDown={e => e.currentTarget.style.transform = 'scale(0.97)'}
            onPointerUp={e => e.currentTarget.style.transform = 'scale(1)'}
          >
            <div style={{ display: 'flex', alignItems: 'center', gap: '8px' }}>
              <span style={{ fontSize: '22px', fontWeight: 800 }}>Match With Partner</span>
              <span style={{
                fontSize: '11px', fontWeight: 700,
                background: 'var(--accent-primary)',
                color: 'white',
                padding: '2px 8px',
                borderRadius: '6px',
              }}>DUO</span>
            </div>
            <div style={{ fontSize: '14px', color: 'var(--text-secondary)', fontWeight: 600, marginTop: '4px' }}>
              Both swipe, find your match
            </div>
          </button>
        </div>
      );
    }

    /* ============================================================
       DUO LINK SCREEN
       ============================================================ */
    function DuoLinkScreen({ sessionId, onContinue }) {
      const [copied, setCopied] = useState(false);
      const link = `swipeeats.app/s/${sessionId}`;

      const copyLink = () => {
        navigator.clipboard?.writeText(`https://${link}`);
        setCopied(true);
        setTimeout(() => setCopied(false), 2000);
      };

      return (
        <div style={{
          height: '100%',
          display: 'flex',
          flexDirection: 'column',
          justifyContent: 'center',
          alignItems: 'center',
          padding: '32px',
          gap: '24px',
        }}>
          <div style={{ fontSize: '56px' }}>🔗</div>
          <h2 style={{ fontSize: '24px', fontWeight: 800, textAlign: 'center' }}>Share with your partner</h2>
          <p style={{ color: 'var(--text-secondary)', textAlign: 'center', fontSize: '15px', fontWeight: 600 }}>
            They'll get the same restaurants to swipe through. When you both swipe right on the same one, it's a match!
          </p>

          <button
            onClick={copyLink}
            style={{
              width: '100%',
              padding: '16px',
              borderRadius: 'var(--radius-btn)',
              border: '1px solid var(--bg-surface)',
              background: 'var(--bg-card)',
              color: copied ? 'var(--accent-secondary)' : 'var(--text-primary)',
              cursor: 'pointer',
              fontSize: '15px',
              fontWeight: 700,
              fontFamily: 'Nunito',
              display: 'flex',
              alignItems: 'center',
              justifyContent: 'center',
              gap: '8px',
              transition: 'all 0.3s',
            }}
          >
            {copied ? '✓ Copied!' : `📋 ${link}`}
          </button>

          <button
            onClick={onContinue}
            style={{
              width: '100%',
              padding: '18px',
              borderRadius: 'var(--radius-btn)',
              border: 'none',
              background: 'linear-gradient(135deg, var(--accent-primary), #FF7043)',
              color: 'white',
              cursor: 'pointer',
              fontSize: '17px',
              fontWeight: 800,
              fontFamily: 'Nunito',
              boxShadow: `0 4px 20px ${`var(--accent-primary-glow)`}`,
            }}
          >
            Start Swiping
          </button>
        </div>
      );
    }

    /* ============================================================
       MATCH NOTIFICATION POPUP
       ============================================================ */
    function MatchNotification({ restaurant, onDismiss }) {
      useEffect(() => {
        const timer = setTimeout(onDismiss, 3000);
        return () => clearTimeout(timer);
      }, [onDismiss]);

      return (
        <div
          onClick={onDismiss}
          style={{
            position: 'absolute',
            top: '60px',
            left: '16px',
            right: '16px',
            background: 'linear-gradient(135deg, var(--accent-primary), #FF7043)',
            borderRadius: '16px',
            padding: '16px 20px',
            display: 'flex',
            alignItems: 'center',
            gap: '14px',
            zIndex: 200,
            cursor: 'pointer',
            boxShadow: '0 8px 32px rgba(232, 93, 58, 0.4)',
            animation: 'slideDown 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275)',
          }}
        >
          <div style={{
            width: '48px', height: '48px', borderRadius: '12px',
            overflow: 'hidden', flexShrink: 0,
          }}>
            <img src={restaurant.photo} alt="" style={{ width: '100%', height: '100%', objectFit: 'cover' }} />
          </div>
          <div>
            <div style={{ fontSize: '13px', fontWeight: 700, opacity: 0.85 }}>IT'S A MATCH!</div>
            <div style={{ fontSize: '17px', fontWeight: 800 }}>{restaurant.name}</div>
          </div>
          <style>{`
            @keyframes slideDown {
              from { transform: translateY(-100px); opacity: 0; }
              to { transform: translateY(0); opacity: 1; }
            }
          `}</style>
        </div>
      );
    }

    /* ============================================================
       LOCK-IN CONFIRMATION SCREEN
       ============================================================ */
    function LockInScreen({ restaurant, onBack, mode }) {
      const [showConfetti, setShowConfetti] = useState(true);

      return (
        <div style={{
          height: '100%',
          display: 'flex',
          flexDirection: 'column',
          position: 'relative',
        }}>
          <ConfettiCanvas active={showConfetti} />

          {/* Back button */}
          <button
            onClick={onBack}
            style={{
              position: 'absolute', top: '16px', left: '16px',
              zIndex: 110,
              width: '40px', height: '40px', borderRadius: '12px',
              border: 'none', background: 'rgba(0,0,0,0.5)',
              color: 'white', cursor: 'pointer',
              display: 'flex', alignItems: 'center', justifyContent: 'center',
              backdropFilter: 'blur(8px)',
            }}
          >
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5">
              <path d="M19 12H5M12 19l-7-7 7-7"/>
            </svg>
          </button>

          {/* Hero photo */}
          <div style={{ height: '50%', position: 'relative', overflow: 'hidden' }}>
            <img
              src={restaurant.photo} alt={restaurant.name}
              style={{ width: '100%', height: '100%', objectFit: 'cover' }}
            />
            <div style={{
              position: 'absolute', bottom: 0, left: 0, right: 0, height: '60%',
              background: 'linear-gradient(transparent, var(--bg-primary))',
            }} />
          </div>

          {/* Info */}
          <div style={{ padding: '0 24px', marginTop: '-40px', position: 'relative', zIndex: 10, flex: 1, display: 'flex', flexDirection: 'column' }}>
            <div style={{
              fontSize: '12px', fontWeight: 800, color: 'var(--accent-primary)',
              letterSpacing: '2px', marginBottom: '8px',
            }}>
              {mode === 'duo' ? "YOU BOTH PICKED" : "TONIGHT'S PICK"}
            </div>
            <h1 style={{ fontSize: '32px', fontWeight: 900, marginBottom: '8px' }}>{restaurant.name}</h1>
            <div style={{ display: 'flex', gap: '12px', alignItems: 'center', marginBottom: '24px' }}>
              <span style={{
                background: 'var(--bg-surface)', padding: '4px 14px',
                borderRadius: '20px', fontSize: '14px', fontWeight: 600,
                color: 'var(--accent-secondary)',
              }}>{restaurant.cuisine}</span>
              <span style={{ fontSize: '14px', color: 'var(--text-secondary)', fontWeight: 600 }}>{restaurant.price}</span>
              <span style={{ fontSize: '14px', color: 'var(--text-secondary)', fontWeight: 600 }}>{restaurant.distance}</span>
            </div>

            {/* Delivery app placeholder */}
            <div style={{
              background: 'var(--bg-card)',
              borderRadius: 'var(--radius-btn)',
              padding: '20px',
              marginBottom: '16px',
            }}>
              <div style={{ fontSize: '12px', fontWeight: 700, color: 'var(--text-dim)', letterSpacing: '1px', marginBottom: '14px' }}>
                ORDER FROM
              </div>
              {['Uber Eats', 'DoorDash', 'Grubhub'].map((app, i) => (
                <div
                  key={app}
                  style={{
                    display: 'flex', justifyContent: 'space-between', alignItems: 'center',
                    padding: '12px 0',
                    borderTop: i > 0 ? '1px solid var(--bg-surface)' : 'none',
                  }}
                >
                  <span style={{ fontWeight: 700, fontSize: '15px' }}>{app}</span>
                  <span style={{
                    background: 'var(--bg-surface)',
                    padding: '6px 14px',
                    borderRadius: '10px',
                    fontSize: '13px',
                    fontWeight: 700,
                    color: 'var(--accent-secondary)',
                    cursor: 'pointer',
                  }}>Open</span>
                </div>
              ))}
            </div>
          </div>
        </div>
      );
    }

    /* ============================================================
       SHUFFLE OVERLAY (Shake Up animation)
       ============================================================ */
    function ShuffleOverlay({ active, newCuisine, onDone }) {
      useEffect(() => {
        if (active) {
          const timer = setTimeout(onDone, 1200);
          return () => clearTimeout(timer);
        }
      }, [active, onDone]);

      if (!active) return null;

      return (
        <div style={{
          position: 'absolute', inset: 0, zIndex: 80,
          background: 'rgba(20, 20, 32, 0.85)',
          backdropFilter: 'blur(12px)',
          display: 'flex', flexDirection: 'column',
          alignItems: 'center', justifyContent: 'center',
          animation: 'shuffleFade 1.2s ease-out',
        }}>
          <div style={{
            fontSize: '48px',
            animation: 'shuffleSpin 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275)',
          }}>🎲</div>
          <div style={{
            marginTop: '16px',
            fontSize: '14px',
            fontWeight: 700,
            color: 'var(--accent-secondary)',
            letterSpacing: '3px',
            textTransform: 'uppercase',
            animation: 'shuffleText 1.2s ease-out',
          }}>SHAKING IT UP</div>
          <style>{`
            @keyframes shuffleFade {
              0% { opacity: 0; }
              20% { opacity: 1; }
              80% { opacity: 1; }
              100% { opacity: 0; }
            }
            @keyframes shuffleSpin {
              from { transform: rotate(0deg) scale(0.5); }
              to { transform: rotate(360deg) scale(1); }
            }
            @keyframes shuffleText {
              0% { opacity: 0; transform: translateY(10px); }
              30% { opacity: 1; transform: translateY(0); }
              80% { opacity: 1; }
              100% { opacity: 0; }
            }
          `}</style>
        </div>
      );
    }

    /* ============================================================
       MAIN APP
       ============================================================ */
    function App() {
      const [screen, setScreen] = useState('session'); // session, duoLink, swiping, lockin
      const [mode, setMode] = useState(null); // solo, duo
      const [sessionId] = useState(() => Math.random().toString(36).substring(2, 8));
      const engineRef = useRef(new PreferenceEngine());
      const [deck, setDeck] = useState([]);
      const [currentIndex, setCurrentIndex] = useState(0);
      const [matches, setMatches] = useState([]);
      const [lockedRestaurant, setLockedRestaurant] = useState(null);
      const [matchNotif, setMatchNotif] = useState(null);
      const [shuffleActive, setShuffleActive] = useState(false);
      const [cardKey, setCardKey] = useState(0); // forces re-render on shuffle

      // Simulate partner swipes for duo mode demo
      const partnerLikes = useRef(new Set());
      useEffect(() => {
        if (mode === 'duo') {
          // Partner "likes" ~40% of restaurants randomly
          const likes = new Set();
          RESTAURANTS.forEach(r => {
            if (Math.random() < 0.4) likes.add(r.id);
          });
          partnerLikes.current = likes;
        }
      }, [mode]);

      const initDeck = useCallback(() => {
        const sorted = engineRef.current.sortRestaurants(RESTAURANTS);
        setDeck(sorted);
        setCurrentIndex(0);
        setCardKey(k => k + 1);
      }, []);

      const handleStart = (selectedMode) => {
        setMode(selectedMode);
        initDeck();
        if (selectedMode === 'duo') {
          setScreen('duoLink');
        } else {
          setScreen('swiping');
        }
      };

      const handleSwipe = useCallback((direction) => {
        const restaurant = deck[currentIndex];
        if (!restaurant) return;

        engineRef.current.recordSwipe(restaurant, direction);

        if (direction === 'right') {
          if (mode === 'duo') {
            // Check if partner also liked
            if (partnerLikes.current.has(restaurant.id)) {
              setMatches(prev => [...prev, restaurant]);
              setMatchNotif(restaurant);
            }
          } else {
            // Solo mode: right swipe adds to matches
            setMatches(prev => [...prev, restaurant]);
          }
        }

        // Advance to next card
        setTimeout(() => {
          setCurrentIndex(prev => prev + 1);
        }, 50);
      }, [deck, currentIndex, mode]);

      const handleShakeUp = useCallback(() => {
        engineRef.current.shakeUp();
        setShuffleActive(true);
      }, []);

      const handleShuffleDone = useCallback(() => {
        setShuffleActive(false);
        const remaining = deck.slice(currentIndex + 1);
        const sorted = engineRef.current.sortRestaurants(remaining);
        setDeck(prev => [...prev.slice(0, currentIndex), prev[currentIndex], ...sorted]);
        setCardKey(k => k + 1);
      }, [deck, currentIndex]);

      const handleLockIn = (restaurant) => {
        engineRef.current.recordOrder(restaurant);
        setLockedRestaurant(restaurant);
        setScreen('lockin');
      };

      // Current cards to show
      const currentCard = deck[currentIndex];
      const nextCard = deck[currentIndex + 1];
      const cardsRemaining = deck.length - currentIndex;

      if (screen === 'session') {
        return <SessionScreen onStart={handleStart} />;
      }

      if (screen === 'duoLink') {
        return <DuoLinkScreen sessionId={sessionId} onContinue={() => setScreen('swiping')} />;
      }

      if (screen === 'lockin') {
        return <LockInScreen restaurant={lockedRestaurant} mode={mode} onBack={() => setScreen('swiping')} />;
      }

      return (
        <div style={{ height: '100%', position: 'relative', display: 'flex', flexDirection: 'column' }}>
          {/* Header */}
          <div style={{
            padding: '16px 20px 8px',
            display: 'flex',
            justifyContent: 'space-between',
            alignItems: 'center',
            zIndex: 20,
          }}>
            <div>
              <span style={{
                fontSize: '20px', fontWeight: 900,
                background: 'linear-gradient(135deg, var(--accent-primary), #FF8A65)',
                WebkitBackgroundClip: 'text', WebkitTextFillColor: 'transparent',
              }}>SwipeEats</span>
              {mode === 'duo' && (
                <span style={{
                  marginLeft: '8px', fontSize: '11px', fontWeight: 700,
                  background: 'var(--accent-primary)', color: 'white',
                  padding: '2px 8px', borderRadius: '6px', verticalAlign: 'middle',
                }}>DUO</span>
              )}
            </div>
            <span style={{ fontSize: '13px', color: 'var(--text-dim)', fontWeight: 700 }}>
              {cardsRemaining > 0 ? `${cardsRemaining} left` : ''}
            </span>
          </div>

          {/* Card area */}
          <div style={{ flex: 1, position: 'relative', display: 'flex', alignItems: 'center' }}>
            {cardsRemaining <= 0 ? (
              <div style={{ textAlign: 'center', width: '100%', padding: '32px' }}>
                <div style={{ fontSize: '48px', marginBottom: '16px' }}>🍽️</div>
                <h2 style={{ fontSize: '22px', fontWeight: 800, marginBottom: '8px' }}>That's all for now!</h2>
                <p style={{ color: 'var(--text-secondary)', fontSize: '15px', fontWeight: 600 }}>
                  {matches.length > 0
                    ? `You have ${matches.length} match${matches.length > 1 ? 'es' : ''} below. Tap one to lock it in!`
                    : 'No matches this round. Try again with Shake Up!'}
                </p>
                <button
                  onClick={() => { initDeck(); }}
                  style={{
                    marginTop: '20px', padding: '14px 32px',
                    borderRadius: 'var(--radius-btn)', border: 'none',
                    background: 'var(--accent-primary)', color: 'white',
                    fontSize: '16px', fontWeight: 800, cursor: 'pointer',
                    fontFamily: 'Nunito',
                  }}
                >Reshuffle</button>
              </div>
            ) : (
              <>
                {nextCard && (
                  <SwipeCard
                    key={`next-${nextCard.id}-${cardKey}`}
                    restaurant={nextCard}
                    isTop={false}
                    onSwipe={() => {}}
                    style={{ transform: 'scale(0.95)', filter: 'brightness(0.7)', top: '8px' }}
                  />
                )}
                {currentCard && (
                  <SwipeCard
                    key={`top-${currentCard.id}-${cardKey}`}
                    restaurant={currentCard}
                    isTop={true}
                    onSwipe={handleSwipe}
                  />
                )}
              </>
            )}
          </div>

          {/* Match tray */}
          <MatchTray matches={matches} onSelect={handleLockIn} />

          {/* Bottom controls */}
          <div style={{
            padding: '12px 32px 32px',
            display: 'flex',
            justifyContent: 'center',
            alignItems: 'center',
            gap: '24px',
            zIndex: 20,
          }}>
            {/* Left swipe button */}
            <button
              onClick={() => currentCard && handleSwipe('left')}
              style={{
                width: '60px', height: '60px', borderRadius: '50%',
                border: '2px solid var(--bg-surface)', background: 'var(--bg-card)',
                color: 'var(--text-secondary)', cursor: 'pointer',
                display: 'flex', alignItems: 'center', justifyContent: 'center',
              }}
            >
              <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round">
                <path d="M18 6L6 18M6 6l12 12"/>
              </svg>
            </button>

            {/* Shake Up */}
            <ShakeUpButton onShakeUp={handleShakeUp} disabled={cardsRemaining <= 1} />

            {/* Right swipe button */}
            <button
              onClick={() => currentCard && handleSwipe('right')}
              style={{
                width: '60px', height: '60px', borderRadius: '50%',
                border: 'none', background: 'linear-gradient(135deg, var(--accent-primary), #FF7043)',
                color: 'white', cursor: 'pointer',
                display: 'flex', alignItems: 'center', justifyContent: 'center',
                boxShadow: `0 4px 16px ${`var(--accent-primary-glow)`}`,
              }}
            >
              <svg width="28" height="28" viewBox="0 0 24 24" fill="currentColor" stroke="none">
                <path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/>
              </svg>
            </button>
          </div>

          {/* Shuffle overlay */}
          <ShuffleOverlay active={shuffleActive} onDone={handleShuffleDone} />

          {/* Match notification */}
          {matchNotif && (
            <MatchNotification
              restaurant={matchNotif}
              onDismiss={() => setMatchNotif(null)}
            />
          )}
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
